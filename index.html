<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمير الكبدة | التجربة الملكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .red-gradient { background: linear-gradient(90deg, #be123c 0%, #fb7185 100%); }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-black italic text-rose-600">AMIR <span class="text-white">LKBDA</span></div>
        <div class="bg-rose-600 px-3 py-1 rounded-full text-sm font-bold">🛒 <span id="cartCount">0</span></div>
    </nav>

    <!-- Hero -->
    <section class="h-[60vh] flex items-center justify-center text-center px-4 pt-20">
        <div class="relative z-10">
            <h1 class="text-5xl font-black mb-4">ملك الكبدة <br><span class="text-rose-600">على أصولها</span></h1>
            <p class="text-gray-400">أفضل مذاق في الجزائر العاصمة، اطلب الآن!</p>
        </div>
    </section>

    <!-- Menu -->
    <main class="max-w-2xl mx-auto px-6 space-y-4">
        <div onclick="addToCart('ساندويتش كبدة ملكي', 450)" class="glass p-4 rounded-3xl flex justify-between items-center cursor-pointer hover:bg-white/10 transition">
            <div>
                <h3 class="font-bold text-lg">ساندويتش كبدة ملكي</h3>
                <p class="text-rose-400 font-bold text-sm">450 دج</p>
            </div>
            <div class="bg-rose-600 p-2 rounded-full">+</div>
        </div>
        
        <div onclick="addToCart('صحن مشكل أمير', 1200)" class="glass p-4 rounded-3xl flex justify-between items-center cursor-pointer hover:bg-white/10 transition">
            <div>
                <h3 class="font-bold text-lg">صحن مشكل أمير</h3>
                <p class="text-rose-400 font-bold text-sm">1200 دج</p>
            </div>
            <div class="bg-rose-600 p-2 rounded-full">+</div>
        </div>
    </main>

    <!-- Modal الطلب -->
    <div id="orderModal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-[2.5rem] p-8 border border-white/10">
            <h3 class="text-2xl font-bold mb-6 text-center">تأكيد الطلبية 🥩</h3>
            <div id="itemsSummary" class="text-sm text-gray-400 mb-6 text-center"></div>
            
            <input id="cName" type="text" placeholder="اسمك الكامل" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-3 outline-none focus:border-rose-600">
            <input id="cPhone" type="tel" placeholder="رقم هاتفك" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-6 outline-none focus:border-rose-600">
            
            <button onclick="sendToFirebase()" id="sendBtn" class="w-full red-gradient py-4 rounded-2xl font-black text-lg shadow-xl shadow-rose-600/30">إرسال الطلب الآن</button>
            <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="w-full mt-4 text-gray-500 text-sm">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        // معلوماتك كاملة ومريكلة 100%
        const firebaseConfig = {
            apiKey: "AIzaSyA--0uPh05hIg1Xe633AZLY-gO0",
            authDomain: "amir-el-kebda.firebaseapp.com",
            projectId: "amir-el-kebda",
            storageBucket: "amir-el-kebda.appspot.com",
            messagingSenderId: "148680741165",
            appId: "1:148680741165:web:9fb3b15afafbf114b583a4",
            databaseURL: "https://amir-el-kebda-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = [];

        window.addToCart = (name, price) => {
            cart.push({name, price});
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('orderModal').classList.remove('hidden');
            document.getElementById('itemsSummary').innerText = "طلبت: " + cart.map(i => i.name).join(' + ');
        };

        window.sendToFirebase = () => {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            if(!name || !phone) { alert("أدخل معلوماتك!"); return; }

            const btn = document.getElementById('sendBtn');
            btn.disabled = true; btn.innerText = "جاري الإرسال...";

            const ordersRef = ref(db, 'orders');
            push(ordersRef, {
                customer: name,
                phone: phone,
                items: cart.map(i => i.name),
                time: new Date().toLocaleTimeString(),
                status: "new"
            }).then(() => {
                alert("تم استلام طلبك يا أمير الكبدة!");
                location.reload();
            });
        };
    </script>
</body>
</html>
