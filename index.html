<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amir el Kebda</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0a0a0a; color: gold; font-family: sans-serif; text-align: center; padding: 50px; }
        input, select { width: 80%; padding: 15px; margin: 10px; border-radius: 10px; }
        .btn { background: gold; color: black; padding: 20px; width: 80%; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Amir el Kebda - المنيو</h1>
    <div id="form">
        <input type="text" id="name" placeholder="الاسم" required>
        <input type="tel" id="phone" placeholder="الهاتف" required>
        <select id="city"><option>ديلي ابراهيم</option><option>الجزائر الوسطى</option></select>
        <button class="btn" onclick="sendOrder()">إرسال الطلب 🍔</button>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyA--0uPh05hIG_zN_Yc",
            authDomain: "amir-el-kebda.firebaseapp.com",
            databaseURL: "https://amir-el-kebda-default-rtdb.firebaseio.com", // تأكد من هذا الرابط في حسابك
            projectId: "amir-el-kebda"
        };
        firebase.initializeApp(config);

        function sendOrder() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            const c = document.getElementById('city').value;

            if(!n || !p) return alert("املا البيانات يا أمير!");

            firebase.database().ref('orders').push({
                name: n, phone: p, city: c, item: "ساندوتش كبدة", time: Date.now()
            })
            .then(() => alert("✅ تم الإرسال بنجاح!"))
            .catch(err => alert("❌ فشل: " + err.message));
        }
    </script>
</body>
</html>
