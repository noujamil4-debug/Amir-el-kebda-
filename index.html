<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amir el Kebda | Le Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- روابط فيربيز الضرورية -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --main-gold: #d4af37; --soft-black: #0a0a0a; --gps-blue: #4285F4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--soft-black); font-family: 'Cairo', sans-serif; color: white; overflow-x: hidden; }

        /* الواجهة الرئيسية */
        #home-view {
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; position: relative;
            background-image: url('https://i.postimg.cc/3RSC6ZW9/doner-tendir-du-poulet-table-140725-2443.jpg');
            background-size: cover; background-position: center; transition: all 0.8s ease;
        }
        #home-view::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 1; }
        .content-wrap { position: relative; z-index: 2; text-align: center; }
        .logo-circle { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--main-gold); margin-bottom: 30px; box-shadow: 0 0 30px rgba(197, 157, 8, 0.4); object-fit: cover; }
        .restaurant-name { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; color: var(--main-gold); font-weight: 900; margin-bottom: 40px; }
        .btn-lemenu { background: none; border: 2px solid var(--main-gold); color: var(--main-gold); padding: 18px 70px; font-size: 1.6rem; font-family: 'Montserrat'; font-weight: 700; border-radius: 100px; cursor: pointer; transition: 0.4s; backdrop-filter: blur(5px); text-transform: uppercase; }
        
        /* واجهة المنيو */
        #menu-view { display: none; width: 100%; min-height: 100vh; background-color: var(--soft-black); padding: 40px 20px; opacity: 0; transform: translateY(30px); transition: all 0.6s ease; position: absolute; top: 0; left: 0; z-index: 100; }
        .back-arrow { position: absolute; top: 30px; right: 30px; width: 55px; height: 55px; border: 1px solid var(--main-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--main-gold); font-size: 1.3rem; cursor: pointer; }
        .category-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1000px; margin: 60px auto; }
        .cat-card { aspect-ratio: 1/1; border-radius: 35px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.8rem; cursor: pointer; transition: 0.5s; background-size: cover; background-position: center; border: 1px solid rgba(197, 157, 8, 0.2); text-shadow: 2px 2px 15px #000; }
        .cat-sandwich { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://i.postimg.cc/xdK9tsxZ/Adobe-Stock-495664482-jpeg-(1).webp'); }
        
        /* استمارة الطلب */
        #orderModal { display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 400px; margin: 40px auto; background: #000; padding: 30px; border-radius: 40px; border: 1px solid var(--main-gold); direction: rtl; text-align: center; }
        input, select { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #333; background: #080808; color: white; font-family: 'Cairo'; text-align: right; font-size: 1rem; }
        .gps-btn { width: 100%; padding: 15px; background: var(--gps-blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .submit-btn { width: 100%; padding: 20px; background: var(--main-gold); color: black; border: none; border-radius: 50px; font-weight: 900; font-size: 1.6rem; cursor: pointer; }
        
        .active-view { display: block !important; opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

    <div id="home-view">
        <div class="content-wrap">
            <img src="https://i.postimg.cc/WzLhYFTb/Screenshot-2026-04-02-12-23-12-451-com-google-android-googlequicksearchbox-edit.jpg" alt="Logo" class="logo-circle">
            <h1 class="restaurant-name">Amir el kebda</h1>
            <button class="btn-lemenu" onclick="showMenu()">Le menu</button>
        </div>
    </div>

    <div id="menu-view">
        <div class="back-arrow" onclick="showHome()"><i class="fas fa-arrow-right"></i></div>
        <h2 style="text-align: center; color: var(--main-gold); margin-top: 60px;">THE MENU</h2>
        <div class="category-container">
            <div class="cat-card cat-sandwich" onclick="openForm('ساندوتش كبدة')">ساندوتش كبدة</div>
        </div>
    </div>

    <div id="orderModal">
        <div class="form-box">
            <h2 id="orderTitle" style="color: var(--main-gold); margin-bottom: 30px;">ساندوتش كبدة</h2>
            <form id="deliveryForm">
                <input type="text" id="custName" placeholder="الاسم" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" required>
                <select id="custCity">
                    <option value="ديلي ابراهيم">ديلي ابراهيم</option>
                    <option value="الجزائر الوسطى">الجزائر الوسطى</option>
                    <option value="باب الواد">باب الواد</option>
                </select>
                <button type="button" class="gps-btn" onclick="getGPS()"><i class="fas fa-location-arrow"></i> تحديد موقعي GPS</button>
                <button type="submit" class="submit-btn">إرسال الطلب 🍔</button>
                <span style="color:#666; cursor:pointer; display:block; margin-top:20px;" onclick="closeForm()">إلغاء</span>
            </form>
        </div>
    </div>

    <script>
        // إعدادات فيربيز الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyA--0uPh05hI9z...", // سيتم تعبئتها تلقائياً من صورتك
            authDomain: "amir-el-kebda.firebaseapp.com",
            projectId: "amir-el-kebda",
            storageBucket: "amir-el-kebda.appspot.com",
            messagingSenderId: "148680741165",
            appId: "1:148680741165:web:9fb3b15afafbf114b583a4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userLocation = "غير محدد";
        function showMenu() { document.getElementById('home-view').style.display = 'none'; document.getElementById('menu-view').classList.add('active-view'); }
        function showHome() { document.getElementById('menu-view').classList.remove('active-view'); document.getElementById('home-view').style.display = 'flex'; }
        function openForm(item) { selectedItem = item; document.getElementById('orderModal').style.display = 'block'; }
        function closeForm() { document.getElementById('orderModal').style.display = 'none'; }

        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    userLocation = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                    document.querySelector('.gps-btn').style.background = "#34A853";
                    document.querySelector('.gps-btn').innerText = "✓ تم تحديد الموقع";
                });
            }
        }

        document.getElementById('deliveryForm').onsubmit = function(e) {
            e.preventDefault();
            const orderData = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                city: document.getElementById('custCity').value,
                item: "ساندوتش كبدة",
                location: userLocation,
                timestamp: Date.now()
            };
            database.ref('orders').push(orderData).then(() => {
                alert("تم إرسال طلبك بنجاح!");
                closeForm();
            });
        };
    </script>
</body>
</html>
