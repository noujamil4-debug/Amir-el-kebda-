<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amir el Kebda | Le Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- روابط فيربيز (Firebase) الحقيقية -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --blue: #4285F4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--black); font-family: 'Cairo', sans-serif; color: white; overflow-x: hidden; }
        #home-view { height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.postimg.cc/3RSC6ZW9/doner-tendir-du-poulet-table-140725-2443.jpg') center/cover; }
        #home-view::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 1; }
        .content-wrap { position: relative; z-index: 2; text-align: center; }
        .logo { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 20px; box-shadow: 0 0 30px rgba(197, 157, 8, 0.4); object-fit: cover; }
        .restaurant-name { font-size: 3rem; color: var(--gold); font-weight: 900; margin-bottom: 30px; }
        .btn-lemenu { background: none; border: 2px solid var(--gold); color: var(--gold); padding: 15px 60px; font-size: 1.4rem; border-radius: 100px; cursor: pointer; font-weight: 700; transition: 0.4s; }
        #menu-view { display: none; width: 100%; min-height: 100vh; padding: 40px 20px; text-align: center; }
        .cat-card { aspect-ratio: 1/1; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.6rem; cursor: pointer; border: 1px solid var(--gold); background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://i.postimg.cc/xdK9tsxZ/Adobe-Stock-495664482-jpeg-(1).webp') center/cover; }
        #orderModal { display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; }
        .form-box { max-width: 400px; margin: 20px auto; background: #000; padding: 25px; border-radius: 30px; border: 1px solid var(--gold); text-align: center; direction: rtl; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #111; color: white; border: 1px solid #333; font-family: 'Cairo'; }
        .submit-btn { width: 100%; padding: 18px; background: var(--gold); color: black; border: none; border-radius: 50px; font-weight: 900; font-size: 1.4rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-view">
        <div class="content-wrap">
            <img src="https://i.postimg.cc/WzLhYFTb/Screenshot-2026-04-02-12-23-12-451-com-google-android-googlequicksearchbox-edit.jpg" class="logo">
            <h1 class="restaurant-name">Amir el kebda</h1>
            <button class="btn-lemenu" onclick="document.getElementById('home-view').style.display='none'; document.getElementById('menu-view').style.display='block';">Le menu</button>
        </div>
    </div>

    <div id="menu-view">
        <h2 style="color: var(--gold); margin-bottom: 40px;">THE MENU</h2>
        <div style="max-width: 600px; margin: 0 auto;">
            <div class="cat-card" onclick="document.getElementById('orderModal').style.display='block'">ساندوتش كبدة</div>
        </div>
    </div>

    <div id="orderModal">
        <div class="form-box">
            <h2 style="color: var(--gold); margin-bottom: 20px;">تأكيد الطلب 🥙</h2>
            <form id="orderForm">
                <input type="text" id="custName" placeholder="الاسم" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" required>
                <select id="custCity"><option>ديلي ابراهيم</option><option>الجزائر الوسطى</option><option>باب الواد</option></select>
                <button type="submit" class="submit-btn" id="sendBtn">إرسال الطلب 🍔</button>
                <p style="margin-top: 15px; color: #666; cursor: pointer;" onclick="document.getElementById('orderModal').style.display='none'">إلغاء</p>
            </form>
        </div>
    </div>

    <script>
        // الإعدادات من صورتك بالظبط (مصلحة 100%)
        const firebaseConfig = {
            apiKey: "AIzaSyA--0uPh05hI9zNbk_YcIG_zN_Yc",
            authDomain: "amir-el-kebda.firebaseapp.com",
            databaseURL: "https://amir-el-kebda-default-rtdb.firebaseio.com", 
            projectId: "amir-el-kebda",
            storageBucket: "amir-el-kebda.appspot.com",
            messagingSenderId: "148680741165",
            appId: "1:148680741165:web:9fb3b15afafbf114b583a4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                city: document.getElementById('custCity').value,
                item: "ساندوتش كبدة",
                time: new Date().getTime()
            };

            // محاولة الإرسال للسحابة
            database.ref('orders').push(data)
            .then(() => {
                alert("تم إرسال طلبك بنجاح .");
                document.getElementById('orderModal').style.display = 'none';
                document.getElementById('orderForm').reset();
                btn.innerText = "إرسال الطلب 🍔";
                btn.disabled = false;
            })
            .catch((err) => {
                alert("❌ فشل الإرسال! تأكد من الـ Rules في فيربيز: " + err.message);
                btn.innerText = "إرسال الطلب 🍔";
                btn.disabled = false;
            });
        };
    </script>
</body>
</html>
