<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | AMIR STAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background-color: #0f1218; color: white; font-family: 'Cairo', sans-serif; margin: 0; }
        header { background: #161b22; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; }
        .bell-btn { background: #ffcc00; color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .bell-btn.active { background: #444; color: #aaa; }
        .dashboard { padding: 30px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .order-card { background: #1a1e26; border-radius: 15px; padding: 20px; border-right: 8px solid #ffcc00; }
        .order-card h3 { color: #ffcc00; margin: 0 0 10px 0; }
        .btn-done { width: 100%; background: #ffcc00; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .loc-link { color: #4285F4; text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <audio id="orderSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header>
        <button id="activateBtn" class="bell-btn" onclick="enableAudio()"><i class="fas fa-bell"></i> اضغط لتفعيل الجرس</button>
        <div style="color: #f85149; font-weight: 900;">AMIR STAFF</div>
    </header>

    <div class="dashboard" id="ordersList">
        <p id="emptyMsg" style="text-align: center; width: 100%; color: #444; margin-top: 50px;">في انتظار الطلبات الجديدة...</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA--0uPh05hI9z...", 
            authDomain: "amir-el-kebda.firebaseapp.com",
            projectId: "amir-el-kebda",
            storageBucket: "amir-el-kebda.appspot.com",
            messagingSenderId: "148680741165",
            appId: "1:148680741165:web:9fb3b15afafbf114b583a4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function enableAudio() {
            document.getElementById('orderSound').play().then(() => {
                document.getElementById('orderSound').pause();
                document.getElementById('activateBtn').innerText = "الجرس يعمل تلقائياً ✓";
                document.getElementById('activateBtn').classList.add('active');
            });
        }

        database.ref('orders').on('child_added', (snapshot) => {
            const data = snapshot.val();
            if(document.getElementById('emptyMsg')) document.getElementById('emptyMsg').remove();
            
            // رن الجرس
            document.getElementById('orderSound').play();

            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <h3>طلب جديد</h3>
                <p><b>الزبون:</b> ${data.name}</p>
                <p><b>الهاتف:</b> ${data.phone}</p>
                <p><b>البلدية:</b> ${data.city}</p>
                <a href="${data.location}" target="_blank" class="loc-link">📍 فتح الموقع في الخريطة</a>
                <button class="btn-done" onclick="this.parentElement.remove()">تم التجهيز ✓</button>
            `;
            document.getElementById('ordersList').prepend(card);
        });
    </script>
</body>
</html>
