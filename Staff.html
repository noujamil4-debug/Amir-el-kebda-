<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - أمير الكبدة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .order-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 5px solid #e67e22; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .item-name { font-size: 1.2rem; font-weight: bold; color: #2c3e50; }
        .harissa-tag { color: #e74c3c; font-weight: bold; background: #fdeaea; padding: 2px 8px; border-radius: 4px; margin-right: 10px; border: 1px solid #e74c3c; }
        .details { margin-top: 10px; color: #7f8c8d; }
        .status-btn { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>الطلبات الواردة 🍟</h1>
    <div id="orders-container">
        <!-- الطلبات ستظهر هنا -->
        جاري تحميل الطلبات...
    </div>

    <!-- تأكد من وضع إعدادات Firebase الخاصة بك هنا -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ضع إعدادات مشروعك هنا (نفس التي في صفحة الطلب)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // جلب الطلبات
        const ordersRef = database.ref('orders');
        ordersRef.on('value', (snapshot) => {
            const container = document.getElementById('orders-container');
            container.innerHTML = ""; // مسح القائمة الحالية
            
            snapshot.forEach((childSnapshot) => {
                const order = childSnapshot.val();
                const orderId = childSnapshot.key;

                // --- الجزء الذي طلبته ---
                // فحص إذا كانت الهريسة موجودة في مصفوفة الإضافات أو النص
                let harissaMarkup = "";
                if (order.extras && (order.extras.includes("هريسة") || JSON.stringify(order.extras).includes("هريسة"))) {
                    harissaMarkup = '<span class="harissa-tag">+ هريسة 🌶️</span>';
                }
                // -----------------------

                const orderHtml = `
                    <div class="order-card" id="order-${orderId}">
                        <div class="order-header">
                            <div>
                                <span class="item-name">${order.itemName || order.title}</span>
                                ${harissaMarkup} 
                            </div>
                            <span>طاولة: ${order.tableNumber || 'سفري'}</span>
                        </div>
                        <div class="details">
                            <p>العدد: ${order.quantity || 1}</p>
                            <p>ملاحظات أخرى: ${order.notes || 'لا يوجد'}</p>
                        </div>
                        <button class="status-btn" onclick="completeOrder('${orderId}')">تم التحضير</button>
                    </div>
                `;
                container.innerHTML += orderHtml;
            });
        });

        function completeOrder(id) {
            if(confirm("هل تم تسليم الطلب؟")) {
                database.ref('orders/' + id).remove(); // حذف الطلب بعد الانتهاء
            }
        }
    </script>
</body>
</html>
