<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AMIR STAFF</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f1218; color: white; font-family: 'Cairo', sans-serif; padding: 20px; }
        header { background: #161b22; padding: 15px; border-bottom: 2px solid #d4af37; display: flex; justify-content: space-between; align-items: center; }
        .order-card { background: #1a1e26; border-radius: 15px; padding: 20px; margin-top: 20px; border-right: 8px solid #d4af37; }
        .btn-bell { background: #d4af37; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <header>
        <button class="btn-bell" onclick="document.getElementById('bellSound').play().then(()=>document.getElementById('bellSound').pause())">تفعيل الجرس 🔔</button>
        <h2 style="color:#f85149">AMIR STAFF</h2>
    </header>
    <div id="list"></div>

    <script>
        const config = {
            apiKey: "AIzaSyA--0uPh05hIG_zN_Yc",
            databaseURL: "https://amir-el-kebda-default-rtdb.firebaseio.com",
            projectId: "amir-el-kebda"
        };
        firebase.initializeApp(config);
        firebase.database().ref('orders').on('child_added', (snap) => {
            document.getElementById('bellSound').play();
            const d = snap.val();
            const card = `<div class="order-card">
                <h3>طلب جديد 🥙</h3>
                <p>الزبون: ${d.name} | الهاتف: ${d.phone}</p>
                <p>البلدية: ${d.city}</p>
                <a href="${d.location}" target="_blank" style="color:#4285F4">📍 موقع GPS</a>
                <button style="width:100%; margin-top:10px; background:#d4af37; border:none; padding:10px; cursor:pointer;" onclick="this.parentElement.remove()">تم التجهيز ✓</button>
            </div>`;
            document.getElementById('list').insertAdjacentHTML('afterbegin', card);
        });
    </script>
</body>
</html>
