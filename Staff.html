<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | AMIR STAFF</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Cairo', sans-serif; padding: 15px; margin: 0; }
        header { background: #161b22; padding: 15px; border-bottom: 2px solid #d4af37; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 15px 15px; }
        .btn-bell { background: #d4af37; color: black; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #list { margin-top: 20px; }
        .card { background: #161b22; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; border-right: 8px solid #d4af37; position: relative; }
        
        /* تنسيق اسم الطلب */
        .order-title { font-size: 1.6rem; color: #fff; font-weight: 900; margin-bottom: 10px; display: block; }
        
        /* تنسيق الهريسة المميز */
        .harissa-highlight { color: #ff4500; background: rgba(255, 69, 0, 0.1); padding: 2px 10px; border-radius: 8px; border: 1px solid #ff4500; font-size: 1.2rem; animation: blink 1s infinite; margin-right: 10px; }
        @keyframes blink { 50% { opacity: 0.4; } }

        .info { color: #8b949e; font-size: 1rem; margin-top: 10px; line-height: 1.8; }
        .info b { color: #d4af37; }

        .gps-link { display: inline-block; margin-top: 10px; color: #4285F4; text-decoration: none; font-weight: bold; }

        .btn-done { width: 100%; margin-top: 20px; background: #238636; color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 12px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header>
        <button class="btn-bell" onclick="document.getElementById('bell').play().then(()=>document.getElementById('bell').pause())">تفعيل الجرس 🔔</button>
        <h2 style="color:#f85149; margin:0;">AMIR STAFF</h2>
    </header>

    <div id="list">
        <center style="margin-top: 50px; color: #444;">جاري انتظار الطلبات الجديدة...</center>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyA--0uPh05hIG_zN_Yc",
            databaseURL: "https://amir-el-kebda-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "amir-el-kebda"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        // الاستماع للطلبات
        db.ref('orders').on('value', (snapshot) => {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = ""; 

            if (!snapshot.exists()) {
                listDiv.innerHTML = "<center style='margin-top:50px;'>لا توجد طلبات حالياً</center>";
                return;
            }

            snapshot.forEach((child) => {
                const d = child.val();
                const id = child.key;

                // معالجة النص لعزل "الهريسة" وتلوينها
                let displayItem = d.item || "طلب غير معروف";
                if (displayItem.includes("هريسة")) {
                    displayItem = displayItem.replace(" + هريسة 🌶️", "") + ' <span class="harissa-highlight">🌶️ مع هريسة</span>';
                }

                const card = `
                <div class="card" id="card-${id}">
                    <span class="order-title">${displayItem}</span>
                    
                    <div class="info">
                        👤 الزبون: <b>${d.name}</b><br>
                        📱 الهاتف: <b>${d.phone}</b><br>
                        📍 المنطقة: <b>${d.city}</b><br>
                        ${d.location !== "غير محدد" ? `<a href="${d.location}" target="_blank" class="gps-link">📍 فتح الموقع على الخريطة</a>` : ""}
                    </div>

                    <button class="btn-done" onclick="completeOrder('${id}')">تم التجهيز ✓</button>
                </div>`;

                listDiv.insertAdjacentHTML('afterbegin', card);
            });

            // تنبيه صوتي عند حدوث أي تغيير (طلب جديد)
            document.getElementById('bell').play().catch(()=>{});
        });

        function completeOrder(id) {
            if(confirm("هل تم تجهيز هذا الطلب؟")) {
                db.ref('orders/' + id).remove();
            }
        }
    </script>

</body>
</html>
