<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مطبخ أمير الكبدة 🔔</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <header class="flex justify-between items-center mb-10 bg-slate-800 p-6 rounded-3xl">
        <h1 class="text-3xl font-black text-rose-500 italic">AMIR STAFF</h1>
        <button id="playBtn" class="bg-yellow-500 text-black font-bold px-6 py-2 rounded-xl">تفعيل الجرس 🔊</button>
    </header>

    <div id="ordersGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA--0uPh05hIg1Xe633AZLY-gO0",
            authDomain: "amir-el-kebda.firebaseapp.com",
            projectId: "amir-el-kebda",
            storageBucket: "amir-el-kebda.appspot.com",
            messagingSenderId: "148680741165",
            appId: "1:148680741165:web:9fb3b15afafbf114b583a4",
            databaseURL: "https://amir-el-kebda-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const bell = document.getElementById('bell');

        document.getElementById('playBtn').onclick = () => {
            bell.play().then(() => bell.pause());
            alert("الجرس مفعل وحاضر!");
        };

        onValue(ref(db, 'orders'), (snapshot) => {
            const grid = document.getElementById('ordersGrid');
            grid.innerHTML = "";
            let count = 0;
            snapshot.forEach((child) => {
                const data = child.val();
                const id = child.key;
                count++;
                grid.innerHTML += `
                    <div class="bg-white text-slate-900 p-6 rounded-[2rem] shadow-xl border-t-8 border-rose-600">
                        <h2 class="text-2xl font-black mb-2">${data.items.join(' + ')}</h2>
                        <p class="font-bold text-rose-600 mb-4">الزبون: ${data.customer} | 📞 ${data.phone}</p>
                        <button onclick="finish('${id}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">تم التحضير ✅</button>
                    </div>
                `;
            });
            if(count > 0) { bell.play(); } else { bell.pause(); }
        });

        window.finish = (id) => {
            remove(ref(db, 'orders/' + id));
        };
    </script>
</body>
</html>
