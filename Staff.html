<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الذكية | AMIR STAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #0f1218;
            --primary-yellow: #ffcc00;
            --card-bg: #1a1e26;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-black); color: white; min-height: 100vh; }

        header {
            background-color: #161b22;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-yellow);
            position: sticky;
            top: 0; z-index: 1000;
        }

        /* زر التفعيل الضروري لبدء الصوت */
        .bell-btn {
            background-color: var(--primary-yellow);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 2s infinite; /* وميض لتنبيه الموظف بالضغط */
        }

        .bell-btn.active { animation: none; background-color: #444; color: #aaa; }

        .header-right { color: #f85149; font-weight: 900; font-size: 1.2rem; }

        .dashboard-container { padding: 30px 5%; }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .order-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border-right: 8px solid var(--primary-yellow);
            animation: slideIn 0.5s ease-out;
        }

        /* أنيميشن عند دخول طلب جديد */
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 204, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); }
        }

        .new-order-tag {
            background: #f85149;
            color: white;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            float: left;
        }
    </style>
</head>
<body>

    <!-- صوت الجرس (رابط ملف صوتي نقي) -->
    <audio id="orderSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header>
        <button id="activateBtn" class="bell-btn" onclick="enableAudio()">
            <i class="fas fa-bell"></i> اضغط لتفعيل جرس الطلبات
        </button>
        <div class="header-right">AMIR STAFF</div>
    </header>

    <div class="dashboard-container">
        <h2 style="margin-bottom: 20px; color: var(--primary-yellow);">الطلبات الواردة الآن</h2>
        <div id="ordersList" class="orders-grid">
            <!-- الطلبات ستظهر هنا تلقائياً -->
            <div class="order-card">
                <span class="new-order-tag">جديد</span>
                <h3>طلب تجريبي #00</h3>
                <p>ساندوتش كبدة إسكندراني</p>
                <button style="margin-top:10px; padding:5px; width:100%;" onclick="this.parentElement.remove()">تم التجهيز</button>
            </div>
        </div>
    </div>

    <!-- إعدادات فيربيز (Firebase) الربط التلقائي -->
    <script type="module">
        // ملاحظة: يجب وضع بيانات Firebase Config الخاصة بك هنا
        // تجدها في صفحة Firebase التي كانت في صورتك الأولى
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            projectId: "amir-el-kebda",
            databaseURL: "https://amir-el-kebda.firebaseio.com",
            // ... باقي البيانات
        };

        // وظيفة تفعيل الصوت (يجب ضغط الزر مرة واحدة)
        window.enableAudio = function() {
            const sound = document.getElementById('orderSound');
            sound.play().then(() => {
                sound.pause(); // نفتح القناة الصوتية للمتصفح ثم نوقفها
                document.getElementById('activateBtn').innerHTML = "<i class='fas fa-check'></i> الجرس يعمل تلقائياً";
                document.getElementById('activateBtn').classList.add('active');
                alert("تم التفعيل! الجرس سيرن لوحده عند أي طلب جديد.");
            });
        }

        // محاكاة وصول طلب جديد (للتجربة)
        // في الحقيقة، سنستخدم: db.collection('orders').onSnapshot(...)
        function simulateNewOrder() {
            const sound = document.getElementById('orderSound');
            const list = document.getElementById('ordersList');
            
            // رن الجرس تلقائياً
            sound.play();

            // إضافة الطلب للشاشة
            const newOrder = document.createElement('div');
            newOrder.className = 'order-card';
            newOrder.innerHTML = `
                <span class="new-order-tag">جديد فوري!</span>
                <h3>طلب خارجي #${Math.floor(Math.random()*100)}</h3>
                <p>2x ساندوتش كبدة + بيبسي</p>
                <button style="margin-top:10px; padding:5px; width:100%; cursor:pointer;" onclick="this.parentElement.remove()">تم التجهيز</button>
            `;
            list.prepend(newOrder); // وضعه في البداية
        }

        // تجربة: أرسل طلب وهمي بعد 5 ثواني لرؤية كيف يعمل الجرس لوحده
        setTimeout(simulateNewOrder, 5000);

    </script>
</body>
</html>
