<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | AMIR STAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #0f1218;
            --primary-yellow: #ffcc00;
            --card-bg: #1a1e26;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-black); color: white; min-height: 100vh; }

        header {
            background-color: #161b22;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-yellow);
            position: sticky;
            top: 0; z-index: 1000;
        }

        .bell-btn {
            background-color: var(--primary-yellow);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bell-btn.active { background-color: #444; color: #aaa; cursor: default; }

        .header-right { color: #f85149; font-weight: 900; font-size: 1.2rem; }

        .dashboard-container { padding: 30px 5%; }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .order-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border-right: 8px solid var(--primary-yellow);
            animation: slideIn 0.5s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .empty-msg {
            text-align: center;
            color: #444;
            margin-top: 100px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <!-- صوت الجرس -->
    <audio id="orderSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header>
        <button id="activateBtn" class="bell-btn" onclick="enableAudio()">
            <i class="fas fa-bell"></i> تفعيل الجرس التلقائي
        </button>
        <div class="header-right">AMIR STAFF</div>
    </header>

    <div class="dashboard-container">
        <h2 style="margin-bottom: 25px; color: var(--primary-yellow);">الطلبات الواردة</h2>
        
        <!-- الحاوية فارغة تماماً الآن -->
        <div id="ordersList" class="orders-grid">
            <p id="noOrders" class="empty-msg">لا توجد طلبات حالياً.. في انتظار الزبائن</p>
        </div>
    </div>

    <script>
        // وظيفة تفعيل نظام الصوت
        window.enableAudio = function() {
            const sound = document.getElementById('orderSound');
            sound.play().then(() => {
                sound.pause(); 
                document.getElementById('activateBtn').innerHTML = "<i class='fas fa-check'></i> الجرس يعمل";
                document.getElementById('activateBtn').classList.add('active');
                document.getElementById('activateBtn').onclick = null;
                alert("تم التفعيل! الجرس سيرن تلقائياً عند وصول أي طلب جديد.");
            }).catch(e => alert("يرجى الضغط مرة أخرى للسماح بالصوت."));
        }

        // هذه الدالة ستستخدمها لاحقاً لاستقبال الطلبات الحقيقية من Firebase
        function addNewOrder(orderData) {
            // إخفاء رسالة "لا توجد طلبات"
            const emptyMsg = document.getElementById('noOrders');
            if(emptyMsg) emptyMsg.remove();

            // رن الجرس
            const sound = document.getElementById('orderSound');
            sound.play();

            // إنشاء البطاقة
            const list = document.getElementById('ordersList');
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <h3 style="color:var(--primary-yellow)">طلب جديد #${orderData.id}</h3>
                <p style="margin:10px 0">${orderData.items}</p>
                <button style="background:var(--primary-yellow); border:none; padding:10px; width:100%; border-radius:5px; font-weight:bold; cursor:pointer;" 
                        onclick="this.parentElement.remove()">تم التجهيز ✓</button>
            `;
            list.prepend(card);
        }
    </script>

</body>
</html>
